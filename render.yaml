services:
  - type: web
    name: vedaai-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: corepack disable && npm install && npx turbo run build --filter=@vedaai/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: COREPACK_ENABLE_STRICT
        value: "0"
